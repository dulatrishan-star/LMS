<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVSEC LMS | Live Class</title>
  <style>
:root{--bg:#08111f;--panel:#0e1e32;--panel2:#132844;--line:#233d5c;--text:#edf6ff;--muted:#9db5cc;--accent:#2ed3ff;--gold:#f8c245;--danger:#ff6678;--ok:#47df9a}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#07101d,#0a2743 60%,#051020);color:var(--text)}
.hidden{display:none!important}.login-screen{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 0%,#15416a,transparent 35%),radial-gradient(circle at 90% 20%,#32536d,transparent 30%),#07101d}.login-card{width:min(460px,100%);background:rgba(14,30,50,.92);border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:0 24px 70px #0009}.brand-row{display:flex;gap:18px;align-items:center;margin-bottom:22px}.brand-row img,.side-brand img{object-fit:contain}.brand-row .srilankan-logo{width:190px;height:auto;background:white;border-radius:12px;padding:6px}.side-brand .side-logo{width:120px;height:auto;background:white;border-radius:8px;padding:4px}.brand-row{flex-wrap:wrap}.brand-row h1{margin:0;font-size:34px}.brand-row p{margin:4px 0;color:var(--muted)}label{display:block;margin:12px 0 7px;color:#cbe4f6;font-weight:650}input,select,textarea{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:#071626;color:var(--text);outline:none}textarea{min-height:96px;resize:vertical}.primary,.ghost,.danger{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#4e8dff);color:#001225}.ghost{background:#132844;color:var(--text);border:1px solid var(--line)}.danger{background:var(--danger);color:white}.login-card .primary{width:100%;margin-top:16px}.login-tabs{display:flex;background:#071626;border-radius:14px;padding:5px}.login-tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:10px;font-weight:800;cursor:pointer}.login-tabs .active{background:var(--panel2);color:var(--text)}.msg{color:var(--danger);min-height:20px}.demo-box{background:#081b2e;border:1px dashed var(--line);border-radius:14px;padding:12px;color:var(--muted);font-size:13px}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{background:rgba(8,17,31,.94);border-right:1px solid var(--line);padding:20px;position:sticky;top:0;height:100vh}.side-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.side-brand small{display:block;color:var(--gold);margin-top:3px}nav{display:grid;gap:8px}nav button{background:transparent;color:var(--muted);border:1px solid transparent;padding:12px 14px;border-radius:14px;text-align:left;font-weight:750;cursor:pointer}nav button:hover,nav button.active{background:var(--panel);border-color:var(--line);color:var(--text)}#logoutBtn{position:absolute;bottom:20px;left:20px;right:20px}.main{padding:22px;overflow:auto}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;background:rgba(14,30,50,.75);border:1px solid var(--line);border-radius:22px;padding:18px 22px}.topbar h2{margin:0}.topbar p{margin:5px 0 0;color:var(--muted)}.user-chip{background:#071626;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--gold)}.page{display:none}.page.active{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:rgba(14,30,50,.85);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 16px 40px #0003}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}.stat{font-size:34px;font-weight:900;color:var(--accent)}.muted{color:var(--muted)}.dept-card{cursor:pointer;transition:.2s}.dept-card:hover{transform:translateY(-3px);border-color:var(--accent)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{color:#bfeaff;background:#0b1b2e}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#071626;border:1px solid var(--line);margin:2px;color:#cbe4f6}.video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.video-card video{width:100%;border-radius:14px;background:#000;max-height:220px}.question-list{display:grid;gap:10px}.question-item{background:#071626;border:1px solid var(--line);border-radius:16px;padding:14px}.answer{color:var(--ok);font-weight:800}.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;background:#071626;border:1px solid var(--line);border-radius:12px;padding:10px}.check-grid label{margin:0;display:flex;gap:8px;align-items:center;font-weight:600}.check-grid input{width:auto}dialog{border:0;border-radius:22px;background:var(--panel);color:var(--text);width:min(560px,95%)}.dialog-card{padding:10px}menu{display:flex;justify-content:flex-end;gap:10px;padding:0;margin-top:18px}.notice{border-left:4px solid var(--gold);padding:12px;background:#1b2530;border-radius:12px;color:#f6df9f}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.main{padding:14px}.grid>*{grid-column:span 12!important}#logoutBtn{position:static;margin-top:12px;width:100%}.topbar{display:block}.user-chip{display:inline-block;margin-top:12px}}
.video-frame{width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.video-card iframe{width:100%;height:100%;min-height:320px;border:0;background:#000;display:block}.question-item label{display:block;margin:6px 0}.notice h3{margin-top:0}.toolbar input{max-width:220px}
.toggle-row{display:flex;align-items:center;gap:10px;margin:12px 0;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#071626}.toggle-row input{width:auto;transform:scale(1.2)}
.click-row{cursor:pointer}.click-row:hover{background:#132844;color:var(--text)}.active-row{background:#183b5f!important;color:var(--text)}.active-row small{color:var(--muted)}.sync-status{position:fixed;right:18px;bottom:18px;background:#0b3b63;color:#fff;padding:10px 14px;border-radius:12px;box-shadow:0 8px 24px #0003;opacity:0;transform:translateY(10px);transition:.25s;z-index:99}.sync-status.show{opacity:1;transform:translateY(0)}
.live-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.live-room-box{background:#071626;border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:10px}.live-frame-wrap{margin-top:12px}.live-frame{width:100%;height:min(72vh,720px);min-height:480px;border:0;border-radius:16px;background:#000}.live-frame-wrap.hidden{display:none!important}.screen-share-tip{border-left:4px solid var(--accent);background:#071626;border-radius:12px;padding:12px;margin:10px 0;color:#cbe4f6}.screen-share-tip b{color:var(--accent)}


  
.option-row{display:grid!important;grid-template-columns:38px 1fr;gap:12px;align-items:center;margin:10px 0!important;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#081b2e}
.option-row input{width:18px;height:18px;margin:0;justify-self:center;accent-color:var(--accent)}
.option-text{line-height:1.45}.option-letter{font-weight:900;color:var(--accent);margin-right:6px}
.written-box{min-height:120px;background:#071626;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:12px;width:100%}
.template-box{background:#071626;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
</style>

  <script>
// Final Google Apps Script Web App URL for AVSEC LMS.
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlGeELazMLWrWwH5-xrCu64JIHOV3Bezgp3LvbGJHlXfffXq6VgoBNuBJe1h8wMty9_Q/exec';

  <script>
const DEPTS=['Engineering','Utility','Ramp','AIS','Cabin Crew','Security'];
const LS='AVSEC_LMS_DATA_V3';
let loginType='admin', state, session=null, selectedDept='AIS', editingUserIndex=null, activePaper=null;
const $=id=>document.getElementById(id);
function defaultState(){return{live:{title:'AVSEC Live Class',link:'',note:'Live class is visible to all users.'},liveClasses:{},users:[],videos:{},qbank:{},papers:{},attempts:[],videoViews:[],settings:{appsScriptUrl:(typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:''),org:'Aviation Security Department',showOpenVideoButton:true}}}
function normalize(){DEPTS.forEach(d=>{state.videos[d]??=[];state.qbank[d]??=[];state.papers[d]??=[]});state.attempts??=[];state.videoViews??=[];state.users??=[];state.users.forEach(u=>{u.pages??=[];u.livePages??=[]});state.live??={title:'AVSEC Live Class',link:'',note:''};state.liveClasses??={};DEPTS.forEach(d=>{state.liveClasses[d]??={title:`${d} Live Class`,link:'',note:''}});state.settings??={};state.settings.appsScriptUrl ||= (typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:''); if(typeof state.settings.showOpenVideoButton==='undefined')state.settings.showOpenVideoButton=true}
function load(){state=JSON.parse(localStorage.getItem(LS)||'null')||defaultState();normalize();localSave()}
function localSave(){localStorage.setItem(LS,JSON.stringify(state))}
let syncTimer=null;
function save(){localSave(); scheduleCloudSave()}
function gasUrl(){return (state?.settings?.appsScriptUrl || (typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:'')).trim()}
function cloudSafeState(){
  const copy=JSON.parse(JSON.stringify(state||{}));
  copy.settings??={};
  // Important: imported .docx template data can be very large and can break Google Sheet sync.
  // Keep the actual template only in this browser; sync only the template name.
  delete copy.settings.importedDocxTemplateData;
  return copy;
}
async function api(action,payload={}){
  const url=gasUrl(); if(!url) return null;
  const res=await fetch(url,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});
  const txt=await res.text();
  let data; try{data=JSON.parse(txt)}catch(e){throw new Error('Apps Script returned non-JSON response. Check deployment access and Web App URL.')}
  if(!data.ok) throw new Error(data.error||'Google Sheet API error');
  return data;
}
async function cloudLoad(){try{const data=await api('loadAll'); if(data&&data.state){state=data.state; normalize(); localSave(); return true}}catch(e){console.warn('Cloud load failed',e); showSync('Google Sheet load failed'); return false}}
function scheduleCloudSave(){if(!gasUrl())return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>cloudSave(),800)}
async function cloudSave(){try{await api('saveAll',{state:cloudSafeState()}); showSync('Google Sheet synced')}catch(e){console.warn('Cloud save failed',e); showSync('Google Sheet sync failed: '+(e.message||'check Apps Script'))}}
function showSync(t){let el=document.getElementById('syncStatus'); if(!el){el=document.createElement('div');el.id='syncStatus';el.className='sync-status';document.body.appendChild(el)} el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
async function init(){load(); await cloudLoad(); document.querySelectorAll('[data-login-type]').forEach(b=>b.onclick=()=>{loginType=b.dataset.loginType;document.querySelectorAll('[data-login-type]').forEach(x=>x.classList.toggle('active',x===b));$('username').placeholder='Username'});$('loginForm').onsubmit=login;$('logoutBtn').onclick=()=>{session=null;$('app').classList.add('hidden');$('loginScreen').classList.remove('hidden')};buildPermChecks()}
function login(e){e.preventDefault();const u=$('username').value.trim(),p=$('password').value;if(loginType==='admin'&&u==='Admin'&&p==='Airbus@24'){session={role:'admin',name:'Admin',username:'Admin',pages:DEPTS,livePages:DEPTS};afterLogin();return}const user=state.users.find(x=>x.username===u&&x.password===p);if(user){session={role:'user',name:user.displayName||user.username,username:user.username,pages:user.pages||[],livePages:user.livePages||[]};afterLogin();return}$('loginMsg').textContent='Invalid username or password'}
function afterLogin(){$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');$('roleBadge').textContent=session.role.toUpperCase();$('currentUserChip').textContent=session.name;renderNav();showPage('dashboard')}
function navBtn(key,label){return `<button data-page="${key}">${label}</button>`}
function hasLiveAccess(){return session?.role==='admin'||((session?.livePages||[]).length>0)}
function renderNav(){let html=navBtn('dashboard','📊 Dashboard');if(hasLiveAccess())html+=navBtn('live','🔴 Live Class');session.pages.forEach(d=>html+=`<button data-page="dept:${d}">🎓 ${d}</button>`);html+=navBtn('paper','📝 Papers');if(session.role==='admin')html+=navBtn('qbank','📚 QBank')+navBtn('activity','📈 Activity Summary')+navBtn('users','👥 Users')+navBtn('settings','⚙️ Settings');$('mainNav').innerHTML=html;document.querySelectorAll('#mainNav button').forEach(b=>b.onclick=()=>{const p=b.dataset.page;if(p.startsWith('dept:')){selectedDept=p.split(':')[1];showPage('dept')}else showPage(p)})}
function setTitle(t,s){$('pageTitle').textContent=t;$('pageSub').textContent=s||''}
function page(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(id+'Page').classList.add('active')}
function showPage(id){if(id==='live'&&!hasLiveAccess()){showPage('dashboard');return}({dashboard:renderDashboard,live:renderLive,dept:renderDept,qbank:renderQbank,paper:renderPaper,activity:renderActivity,users:renderUsers,settings:renderSettings}[id]||renderDashboard)();page(id)}
function renderDashboard(){setTitle('Dashboard','Training overview');const totalQ=DEPTS.reduce((a,d)=>a+state.qbank[d].length,0),totalV=DEPTS.reduce((a,d)=>a+state.videos[d].length,0),done=state.attempts.filter(a=>a.user===session.username).length;$('dashboardPage').innerHTML=`<div class="grid"><div class="card span-3"><div class="stat">${session.pages.length}</div><b>Accessible Pages</b></div><div class="card span-3"><div class="stat">${totalV}</div><b>Videos</b></div><div class="card span-3"><div class="stat">${totalQ}</div><b>QBank Questions</b></div><div class="card span-3"><div class="stat">${session.role==='admin'?state.users.length:done}</div><b>${session.role==='admin'?'Users':'Papers Done'}</b></div><div class="card span-12"><h3>Department Pages</h3><div class="grid">${session.pages.map(d=>`<div class="card span-4 dept-card" onclick="selectedDept='${d}';showPage('dept')"><h3>${d}</h3><p class="muted">Videos: ${state.videos[d].length} | Papers: ${state.papers[d].length}</p></div>`).join('')}</div></div></div>`}
function renderLive(){setTitle('Live Classes','Assigned live classes only');const admin=session.role==='admin';const depts=admin?DEPTS:(session.livePages||[]);normalize();$('livePage').innerHTML=`<div class="grid">${depts.map(d=>{const id=liveSafeId(d);const l=normalizeLiveClass(d);const room=l.roomName||makeRoomName(d);const url=liveRoomUrl(room);const isExternal=l.mode==='external';const status=l.active?'LIVE NOW':'READY / ENDED';return `<div class="card span-12"><div class="live-head"><div><h3>🔴 ${esc(d)}</h3><h4>${esc(l.title||d+' Live Class')}</h4><p class="muted"><b>Status:</b> ${esc(status)}${l.endedAt?` | Last ended: ${esc(l.endedAt)}`:''}</p></div><span class="pill">${isExternal?'External Link':'Live Room'}</span></div>${l.note?`<p class="notice">${esc(l.note)}</p>`:''}${isExternal?`${l.link?`<p><a class="primary" href="${esc(l.link)}" target="_blank" rel="noopener">Join External Live Class</a></p>`:'<p class="muted">No external live link added for this section.</p>'}`:`<div class="live-room-box"><div class="toolbar"><button class="primary" onclick="openLiveRoom('${esc(d)}')">${admin?'Start Live Class':'Join Live Class'}</button>${admin?`<button class="ghost" onclick="startScreenShareGuide('${esc(d)}')">🖥️ Share Windows Screen</button><button class="danger" onclick="endLiveClass('${esc(d)}')">End Live Class</button>`:''}<button class="ghost" onclick="copyLiveRoom('${esc(room)}')">Copy Room ID</button></div><p class="muted"><b>Current Room ID:</b> ${esc(room)}</p><div id="screenTip_${id}" class="screen-share-tip hidden"><b>Screen sharing:</b> The room will open in a new tab. Inside Jitsi, click the screen share icon and choose Entire Screen, Window, or Chrome Tab.</div></div>`}${admin?`<hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><div class="grid"><div class="span-6"><label>Live Title</label><input id="liveTitle_${id}" value="${esc(l.title||'')}"><label>Class Type</label><select id="liveMode_${id}"><option value="inbuilt" ${!isExternal function renderQbank(){setTitle('QBank Manager','Import, edit, shuffle and assign papers');const depts=DEPTS;if(!depts.includes(selectedDept))selectedDept=depts[0];const deptUsers=state.users.filter(u=>(u.pages||[]).includes(selectedDept));$('qbankPage').innerHTML=`<div class="grid"><div class="card span-4"><label>Department</label><select id="qbDept" onchange="selectedDept=this.value;renderQbank()">${depts.map(d=>`<option ${d===selectedDept?'selected':''}>${d}</option>`).join('')}</select><h3>Add MCQ Question</h3><label>Question</label><textarea id="qText"></textarea><label>A</label><input id="opA"><label>B</label><input id="opB"><label>C</label><input id="opC"><label>D</label><input id="opD"><label>Correct Answer</label><select id="ans"><option>A</option><option>B</option><option>C</option><option>D</option></select><button class="primary" onclick="addQuestion()">Add MCQ Question</button><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h3>Add Written Question</h3><label>Written Question</label><textarea id="wText" placeholder="Enter essay / short answer question"></textarea><label>Marks / Points</label><input id="wPoints" type="number" min="1" value="5"><label>Model Answer / Note (Admin only)</label><textarea id="wAnswer" placeholder="Optional marking guide"></textarea><button class="primary" onclick="addWrittenQuestion()">Add Written Question</button></div><div class="card span-8"><div class="toolbar"><input type="file" id="importFile" accept=".csv,.xlsx,.xls,.docx,.txt"><button class="ghost" onclick="importQuestions()">Import Word/Excel</button><input id="paperCount" type="number" min="1" placeholder="Paper question count"><input id="paperTitle" placeholder="Paper title"><button class="primary" onclick="createPaper()">Shuffle & Assign Paper</button><button class="ghost" onclick="exportPaperWord()">Export Shuffled Word</button></div><div class="template-box"><h3>Word Export Template</h3><p class="muted">Import a .docx file with your header/footer. Put <b>{{QUESTIONS}}</b> in the body where the questions must be inserted. Header/footer will be preserved. Optional placeholders: <b>{{DEPARTMENT}}</b>, <b>{{DATE}}</b>, <b>{{TITLE}}</b>.</p><div class="toolbar"><input type="file" id="docxTemplateFile" accept=".docx"><button class="ghost" onclick="importDocxTemplate()">Import Word Template</button><button class="ghost" onclick="clearDocxTemplate()">Clear Template</button></div><p id="templateStatus" class="muted">${state.settings.importedDocxTemplateName?'Current template: '+esc(state.settings.importedDocxTemplateName):'No imported Word template selected.'}</p><label>Fallback Template Text</label><textarea id="wordTemplateText" placeholder="AVSEC LMS - {{DEPARTMENT}} Question Paper&#10;Candidate Name: ____________________&#10;Date: {{DATE}}&#10;&#10;{{QUESTIONS}}">${esc(state.settings.wordTemplateText||'')}</textarea><button class="ghost" onclick="saveWordTemplate()">Save Fallback Text Template</button></div><div class="notice"><b>Assign paper to users</b><br>Select users below. If multiple users are selected, each user receives a separate shuffled paper and only that user can see it. Shuffle is improved to reduce duplicate papers.</div><div class="check-grid" style="margin:12px 0">${deptUsers.map(u=>`<label><input type="checkbox" class="paper-user-check" value="${esc(u.username)}"> ${esc(u.displayName||u.username)} <small>(${esc(u.username)})</small></label>`).join('')||'<span class="muted">No users assigned to this department yet.</span>'}</div><div class="toolbar"><button class="ghost" onclick="document.querySelectorAll('.paper-user-check').forEach(c=>c.checked=true)">Select All Users</button><button class="ghost" onclick="document.querySelectorAll('.paper-user-check').forEach(c=>c.checked=false)">Clear</button></div><p class="muted">Answer is visible only inside Admin QBank. Word export is shuffled and does not include answer key.</p><h3>${selectedDept} QBank (${state.qbank[selectedDept].length})</h3>${state.qbank[selectedDept].map((q,i)=>`<div class="question-item"><b>${i+1}. ${esc(q.question)}</b>${q.type==='written'?`<p class="pill">Written Question | ${esc(q.points||5)} marks</p><p class="answer">Admin Note: ${esc(q.answerText||'-')}</p>`:`<p>A. ${esc(q.A)}<br>B. ${esc(q.B)}<br>C. ${esc(q.C)}<br>D. ${esc(q.D)}</p><p class="answer">Admin Answer: ${esc(q.answer)}</p>`}<button class="ghost" onclick="editQuestion(${i})">Edit</button> <button class="danger" onclick="state.qbank['${selectedDept}'].splice(${i},1);save();renderQbank()">Delete</button></div>`).join('')||'<p class="muted">No questions.</p>'}</div></div>`}
function addQuestion(){if(!qText.value.trim())return;state.qbank[selectedDept].push({id:crypto.randomUUID(),type:'mcq',question:qText.value,A:opA.value,B:opB.value,C:opC.value,D:opD.value,answer:ans.value});save();renderQbank()}

function editQuestion(i){const q=state.qbank[selectedDept][i];const nq=prompt('Edit question',q.question);if(nq!==null){q.question=nq;if(q.type==='written'){q.points=Number(prompt('Marks / Points',q.points||5))||q.points||5;q.answerText=prompt('Model Answer / Note',q.answerText||'')||q.answerText||''}else{const na=prompt('Correct Answer A/B/C/D',q.answer);q.answer=(na||q.answer).toUpperCase()[0]}save();renderQbank()}}
function parseRows(rows){rows.forEach(r=>{let a=Array.isArray(r)?r:Object.values(r);if(a.length>=6&&String(a[0]).toLowerCase()!=='question')state.qbank[selectedDept].push({id:crypto.randomUUID(),type:'mcq',question:a[0]||'',A:a[1]||'',B:a[2]||'',C:a[3]||'',D:a[4]||'',answer:String(a[5]||'A').trim().toUpperCase()[0]});else if(a.length>=1&&String(a[0]).trim()&&String(a[0]).toLowerCase()!=='question')state.qbank[selectedDept].push({id:crypto.randomUUID(),type:'written',question:a[0]||'',points:Number(a[1])||5,answerText:a[2]||''})})}
function importQuestions(){const f=importFile.files[0];if(!f)return alert('Select file');const ext=f.name.split('.').pop().toLowerCase();const r=new FileReader();r.onload=async e=>{if(['xlsx','xls'].includes(ext)&&window.XLSX){const wb=XLSX.read(e.target.result,{type:'array'});parseRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}))}else{let text=e.target.result;if(ext==='docx'&&window.mammoth){let res=await mammoth.extractRawText({arrayBuffer:e.target.result});text=res.value}parseRows(String(text).split(/\n+/).map(l=>l.split('|').map(x=>x.trim())))}save();renderQbank()};(['xlsx','xls','docx'].includes(ext))?r.readAsArrayBuffer(f):r.readAsText(f)}
function seededShuffle(arr,seed){let a=[...arr],h=2166136261;String(seed).split('').forEach(ch=>{h^=ch.charCodeAt(0);h=Math.imul(h,16777619)});function rnd(){h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296}for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffledQuestions(count,seed=Date.now()){const bank=state.qbank[selectedDept]||[];return seededShuffle(bank,seed).slice(0,Math.min(count,bank.length))}
function createPaper(){const count=Number(paperCount.value)||10;const selectedUsers=[...document.querySelectorAll('.paper-user-check:checked')].map(c=>c.value);if(!selectedUsers.length)return alert('Select at least one user to assign this paper');const titleBase=paperTitle.value||`${selectedDept} Paper`;let created=0,used=new Set();const batch=Date.now();selectedUsers.forEach((username,idx)=>{let qs=[],sig='';for(let tries=0;tries<40;tries++){qs=shuffledQuestions(count,`${selectedDept}-${username}-${batch}-${idx}-${tries}`);sig=qs.map(q=>q.id).sort().join('|');if(!used.has(sig)||count>=state.qbank[selectedDept].length)break}used.add(sig);if(!qs.length)return;const user=state.users.find(u=>u.username===username);state.papers[selectedDept].push({id:crypto.randomUUID(),title:selectedUsers.length>1?`${titleBase} - ${user?.displayName||username}`:titleBase,dept:selectedDept,created:Date.now(),questions:qs.map(q=>q.id),assignedUsers:[username],assignedNames:[user?.displayName||username]});created++});if(!created)return alert('No questions in QBank');save();alert(`${created} improved shuffled paper(s) created and assigned to selected user(s)`);renderQbank()}
function getPaperQs(p){return p.questions.map(id=>state.qbank[p.dept].find(q=>q.id===id)).filter(Boolean)}
function getStoredDocxTemplate(){
  try{
    const raw=localStorage.getItem(DOCX_TPL_LS);
    if(raw)return JSON.parse(raw);
  }catch(e){console.warn('Template local read failed',e)}
  // Backward compatibility with older versions that stored template inside synced state.
  if(state.settings.importedDocxTemplateData){
    return {name:state.settings.importedDocxTemplateName||'Imported template.docx',data:state.settings.importedDocxTemplateData};
  }
  return null;
}
function importDocxTemplate(){
  const f=document.getElementById('docxTemplateFile')?.files?.[0];
  if(!f)return alert('Select a .docx template first');
  if(!f.name.toLowerCase().endsWith('.docx'))return alert('Only .docx templates are supported');
  const r=new FileReader();
  r.onload=e=>{
    // Store the real template locally so Google Sheet sync does not fail from a large base64 docx.
    localStorage.setItem(DOCX_TPL_LS,JSON.stringify({name:f.name,data:e.target.result,savedAt:Date.now()}));
    state.settings.importedDocxTemplateName=f.name;
    delete state.settings.importedDocxTemplateData;
    save();
    const st=document.getElementById('templateStatus');
    if(st)st.textContent='Current template: '+f.name+' (ready for export)';
    alert('Word template imported. Now click Export Shuffled Word. Google Sync is safe because the large template file stays local.');
  };
  r.readAsDataURL(f);
}
function clearDocxTemplate(){
  localStorage.removeItem(DOCX_TPL_LS);
  delete state.settings.importedDocxTemplateName;
  delete state.settings.importedDocxTemplateData;
  save();
  renderQbank();
}
function xmlEsc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function wmlParagraph(text,bold=false){
  return `<w:p><w:r>${bold?'<w:rPr><w:b/></w:rPr>':''}<w:t xml:space="preserve">${xmlEsc(text)}</w:t></w:r></w:p>`;
}
function questionWml(q,i){
  const out=[];
  out.push(wmlParagraph(`${i+1}. ${q.question||''}`,true));
  if(q.type==='written'){
    out.push(wmlParagraph(`(${q.points||5} marks)`));
    out.push(wmlParagraph('Answer: ________________________________________________________________'));
    out.push(wmlParagraph('________________________________________________________________________'));
    out.push(wmlParagraph('________________________________________________________________________'));
  }else{
    out.push(wmlParagraph(`☐ A. ${q.A||''}`));
    out.push(wmlParagraph(`☐ B. ${q.B||''}`));
    out.push(wmlParagraph(`☐ C. ${q.C||''}`));
    out.push(wmlParagraph(`☐ D. ${q.D||''}`));
  }
  out.push(wmlParagraph(''));
  return out.join('');
}
function replaceSimpleDocxPlaceholders(xml,vars){
  Object.entries(vars).forEach(([k,v])=>{
    const safe=xmlEsc(v);
    xml=xml.replaceAll(`{{${k}}}`,safe).replaceAll(`{${k}}`,safe);
  });
  return xml;
}
function exportWithImportedDocxTemplate(qs){
  if(!window.PizZip){
    alert('Word template engine is still loading. Check internet connection and try again in a few seconds.');
    return false;
  }
  try{
    const tpl=getStoredDocxTemplate();
    if(!tpl||!tpl.data)return false;
    const base64=tpl.data.split(',')[1];
    const binary=atob(base64);
    const zip=new PizZip(binary);
    const title=(document.getElementById('paperTitle')?.value || `${selectedDept} Question Paper`).trim();
    const vars={DEPARTMENT:selectedDept,DATE:new Date().toLocaleString(),TITLE:title};
    const questionsXml=qs.map(questionWml).join('');
    const docFile=zip.file('word/document.xml');
    if(!docFile)throw new Error('Invalid DOCX template: word/document.xml not found');
    let xml=docFile.asText();
    let inserted=false;
    if(xml.includes('{{QUESTIONS}}')){xml=xml.replaceAll('{{QUESTIONS}}',questionsXml);inserted=true;}
    if(xml.includes('{QUESTIONS}')){xml=xml.replaceAll('{QUESTIONS}',questionsXml);inserted=true;}
    xml=replaceSimpleDocxPlaceholders(xml,vars);
    // If Word split the {{QUESTIONS}} placeholder across XML runs, still export questions by appending them to the body.
    if(!inserted){
      if(xml.includes('<w:sectPr'))xml=xml.replace('<w:sectPr',questionsXml+'<w:sectPr');
      else xml=xml.replace('</w:body>',questionsXml+'</w:body>');
    }
    zip.file('word/document.xml',xml);
    // Replace simple placeholders in headers and footers too, without disturbing header/footer design.
    Object.keys(zip.files).forEach(name=>{
      if(/^word\/(header|footer)\d*\.xml$/.test(name)){
        zip.file(name,replaceSimpleDocxPlaceholders(zip.file(name).asText(),vars));
      }
    });
    const blob=zip.generate({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${selectedDept}_Question_Paper_Template.docx`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    return true;
  }catch(err){
    console.error(err);
    alert('Template export failed: '+(err.message||err)+'. Try placing {{QUESTIONS}} in the main document body, not inside a text box/shape.');
    return false;
  }
}
function saveWordTemplate(){state.settings.wordTemplateText=wordTemplateText.value;save();alert('Word template saved')}
function questionWordHtml(q,i){if(q.type==='written')return `<div style="margin:14px 0"><p><b>${i+1}. ${esc(q.question)}</b> <span style="color:#666">(${esc(q.points||5)} marks)</span></p><p>Answer: __________________________________________________________________</p><p>__________________________________________________________________________</p><p>__________________________________________________________________________</p></div>`;return `<div style="margin:14px 0"><p><b>${i+1}. ${esc(q.question)}</b></p><p>A. ${esc(q.A)}<br>B. ${esc(q.B)}<br>C. ${esc(q.C)}<br>D. ${esc(q.D)}</p></div>`}
function exportPaperWord(){const count=Number(paperCount?.value)||state.qbank[selectedDept].length;const qs=shuffledQuestions(count,`export-${selectedDept}-${Date.now()}`);if(getStoredDocxTemplate()){if(exportWithImportedDocxTemplate(qs))return;}const qHtml=qs.map(questionWordHtml).join('');let template=state.settings.wordTemplateText||`<h1>AVSEC LMS - {{DEPARTMENT}} Question Paper</h1><p><b>Date:</b> {{DATE}}</p><p><b>Candidate Name:</b> ____________________________</p><p><b>Section:</b> {{DEPARTMENT}}</p><hr>{{QUESTIONS}}`;template=template.replace(/\n/g,'<br>');let body=template.replaceAll('{{DEPARTMENT}}',esc(selectedDept)).replaceAll('{{DATE}}',new Date().toLocaleString()).replaceAll('{{TITLE}}',esc((paperTitle?.value||selectedDept+' Question Paper'))).replace('{{QUESTIONS}}',qHtml);if(!body.includes(qHtml))body+=qHtml;let html=`<html><head><meta charset='utf-8'><style>body{font-family:Arial,sans-serif;line-height:1.45} h1{text-align:center} p{font-size:12pt}</style></head><body>${body}</body></html>`;download(`${selectedDept}_Question_Paper_Template.doc`,html,'application/msword')}
function hasAttemptedPaper(paperId){return session&&session.role==='user'&&state.attempts.some(a=>a.user===session.username&&a.paperId===paperId)}
function lastPaperAttempt(paperId){return [...state.attempts].reverse().find(a=>a.user===session.username&&a.paperId===paperId)}
function canSeePaper(p){return session.role==='admin'||!(p.assignedUsers&&p.assignedUsers.length)||p.assignedUsers.includes(session.username)}
function renderPaper(){setTitle('Papers','User tick-off papers and instant marking');const depts=session.role==='admin'?DEPTS:session.pages;if(!depts.includes(selectedDept))selectedDept=depts[0];const visiblePapers=state.papers[selectedDept].map((p,i)=>({...p,_index:i})).filter(canSeePaper);$('paperPage').innerHTML=`<div class="card"><label>Department</label><select onchange="selectedDept=this.value;renderPaper()">${depts.map(d=>`<option ${d===selectedDept?'selected':''}>${d}</option>`).join('')}</select><h3>Available Papers</h3>${visiblePapers.map((p)=>{const done=hasAttemptedPaper(p.id);const old=done?lastPaperAttempt(p.id):null;const assigned=(p.assignedNames&&p.assignedNames.length)?p.assignedNames.join(', '):(p.assignedUsers&&p.assignedUsers.length?p.assignedUsers.join(', '):'All users / old paper');return `<div class="question-item"><b>${esc(p.title)}</b><p class="muted">${p.dept} | Questions: ${p.questions.length} | ${new Date(p.created).toLocaleString()}${session.role==='admin'?` | Assigned: ${esc(assigned)}`:''}</p>${done?`<div class="notice"><b>Completed / Already Attempted</b><br>This paper can be submitted only one time. Score: ${old.correct}/${old.total} (${old.score}%)<br><button class="ghost" onclick="downloadMarkSheet('${old.id}')">Download Mark Sheet PDF</button></div>`:`<button class="primary" onclick="startPaper('${p.id}')">Open Paper</button>`}${session.role==='admin'?` <button class="danger" onclick="state.papers['${selectedDept}'].splice(${p._index},1);save();renderPaper()">Delete</button>`:''}</div>`}).join('')||'<p class="muted">No papers assigned / created yet.</p>'}</div><div id="paperWork"></div>`}
function startPaper(id){const p=state.papers[selectedDept].find(x=>x.id===id);if(!p)return;if(!canSeePaper(p)){return alert('This paper is not assigned to this user')}if(hasAttemptedPaper(id)){const old=lastPaperAttempt(id);$('paperWork').innerHTML=`<div class="card notice"><h3>Already Attempted</h3><p>You have already submitted this paper. One paper can be attempted only one time.</p><p><b>Score:</b> ${old.correct}/${old.total} (${old.score}%)</p><button class="ghost" onclick="downloadMarkSheet('${old.id}')">Download Mark Sheet PDF</button></div>`;return}activePaper=p;const qs=getPaperQs(p);$('paperWork').innerHTML=`<div class="card"><h3>${esc(p.title)}</h3><form id="attemptForm">${qs.map((q,i)=>`<div class="question-item"><b>${i+1}. ${esc(q.question)}</b>${q.type==='written'?`<p class="muted">Written answer (${esc(q.points||5)} marks) - saved for admin review.</p><textarea class="written-box" name="q${i}_written" placeholder="Type your answer here"></textarea>`:['A','B','C','D'].map(o=>`<label class="option-row"><input type="radio" name="q${i}" value="${o}" required><span class="option-text"><span class="option-letter">${o}.</span>${esc(q[o])}</span></label>`).join('')}</div>`).join('')}<button class="primary">Submit Paper</button></form><div id="markResult"></div></div>`;$('attemptForm').onsubmit=submitPaper}
function submitPaper(e){e.preventDefault();if(session.role==='admin')return alert('Login as user to attempt paper');if(hasAttemptedPaper(activePaper.id)){alert('You have already submitted this paper.');renderPaper();return}const qs=getPaperQs(activePaper);let correct=0,totalAuto=0,answers=[];qs.forEach((q,i)=>{if(q.type==='written'){const t=document.querySelector(`[name=q${i}_written]`)?.value||'';answers.push({qid:q.id,type:'written',text:t,points:q.points||5});return}const a=document.querySelector(`[name=q${i}]:checked`).value;answers.push({qid:q.id,type:'mcq',selected:a,correct:q.answer});totalAuto++;if(a===q.answer)correct++});const score=totalAuto?Math.round((correct/totalAuto)*100):0;const writtenCount=answers.filter(a=>a.type==='written').length;const rec={id:crypto.randomUUID(),user:session.username,name:session.name,dept:activePaper.dept,paperId:activePaper.id,paperTitle:activePaper.title,total:totalAuto,correct,score,writtenCount,answers,date:Date.now()};state.attempts.push(rec);save();$('markResult').innerHTML=`<div class="notice"><h3>Result: ${correct}/${totalAuto} (${score}%)</h3>${writtenCount?`<p>${writtenCount} written answer(s) saved for admin review.</p>`:''}<p>This paper is now completed. You cannot submit it again.</p><button class="ghost" onclick="downloadMarkSheet('${rec.id}')">Download Mark Sheet PDF</button></div>`}
function downloadMarkSheet(id){const r=state.attempts.find(a=>a.id===id);const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(16);doc.text('AVSEC LMS - Mark Sheet',14,18);doc.setFontSize(11);let y=32;[['Name',r.name],['Username',r.user],['Department',r.dept],['Paper',r.paperTitle],['Date',new Date(r.date).toLocaleString()],['Score',`${r.correct}/${r.total} (${r.score}%)`],['Written Answers',String(r.writtenCount||0)]].forEach(row=>{doc.text(`${row[0]}: ${row[1]}`,14,y);y+=8});doc.save(`${r.user}_${r.paperTitle}_MarkSheet.pdf`)}
let selectedActivityDept=null, selectedActivityUser=null;
function userStats(username){return{user:state.users.find(u=>u.username===username)||{username,displayName:username,pages:[]},views:state.videoViews.filter(v=>v.user===username),attempts:state.attempts.filter(a=>a.user===username)}}
function renderActivity(){setTitle('Activity Summary','Select section first, then click a user to load full activity');
  const deptRows=DEPTS.map(d=>{
    const users=state.users.filter(u=>(u.pages||[]).includes(d));
    const views=state.videoViews.filter(v=>v.dept===d);
    const attempts=state.attempts.filter(a=>a.dept===d);
    return {dept:d,users,views,attempts};
  });
  if(!selectedActivityDept) selectedActivityDept=deptRows.find(x=>x.users.length)?.dept || DEPTS[0];
  const sectionUsers=state.users.filter(u=>(u.pages||[]).includes(selectedActivityDept));
  if(selectedActivityUser && !sectionUsers.some(u=>u.username===selectedActivityUser)) selectedActivityUser=null;
  const rows=sectionUsers.map(u=>userStats(u.username));
  const first=selectedActivityUser||rows[0]?.user.username;
  const detail=first?userStats(first):null;
  $('activityPage').innerHTML=`<div class="grid"><div class="card span-4"><div class="toolbar"><button class="primary" onclick="exportActivityPDF()">Export Summary PDF</button><button class="ghost" onclick="cloudLoad().then(()=>renderActivity())">Refresh</button></div><h3>Sections</h3><p class="muted">First select department / section.</p><div class="table-wrap"><table><thead><tr><th>Section</th><th>Users</th><th>Videos</th><th>Papers</th></tr></thead><tbody>${deptRows.map(r=>`<tr class="click-row ${selectedActivityDept===r.dept?'active-row':''}" onclick="selectedActivityDept='${esc(r.dept)}';selectedActivityUser=null;renderActivity()"><td><b>${esc(r.dept)}</b></td><td>${r.users.length}</td><td>${r.views.length}</td><td>${r.attempts.length}</td></tr>`).join('')}</tbody></table></div></div><div class="card span-4"><h3>${esc(selectedActivityDept)} Users</h3><p class="muted">Click user name to see activity.</p><div class="table-wrap"><table><thead><tr><th>User Name</th><th>Videos</th><th>Papers</th><th>Avg</th></tr></thead><tbody>${rows.map(r=>{const deptViews=r.views.filter(v=>v.dept===selectedActivityDept);const deptAttempts=r.attempts.filter(a=>a.dept===selectedActivityDept);const avg=deptAttempts.length?Math.round(deptAttempts.reduce((a,b)=>a+b.score,0)/deptAttempts.length):0;return `<tr class="click-row ${first===r.user.username?'active-row':''}" onclick="selectedActivityUser='${esc(r.user.username)}';renderActivity()"><td><b>${esc(r.user.displayName||r.user.username)}</b><br><small>${esc(r.user.username)}</small></td><td>${deptViews.length}</td><td>${deptAttempts.length}</td><td>${deptAttempts.length?avg+'%':'-'}</td></tr>`}).join('')||'<tr><td colspan="4">No users in this section.</td></tr>'}</tbody></table></div></div><div class="card span-4">${detail?renderUserActivityDetail(detail,selectedActivityDept):'<p class="muted">Select a user.</p>'}</div></div>`}
function renderUserActivityDetail(r,deptFilter=null){const views=deptFilter?r.views.filter(v=>v.dept===deptFilter):r.views;const attempts=deptFilter?r.attempts.filter(a=>a.dept===deptFilter):r.attempts;return `<div class="toolbar"><div><h3>${esc(r.user.displayName||r.user.username)}</h3><p class="muted">${esc(r.user.username)} | Access: ${(r.user.pages||[]).join(', ')||'-'}</p></div><button class="ghost" onclick="exportSingleUserPDF('${esc(r.user.username)}')">Export This User PDF</button></div><h4>Video Activity</h4><div class="table-wrap"><table><thead><tr><th>Date</th><th>Department</th><th>Video</th></tr></thead><tbody>${views.map(v=>`<tr><td>${new Date(v.date).toLocaleString()}</td><td>${esc(v.dept)}</td><td>${esc(v.videoTitle)}</td></tr>`).join('')||'<tr><td colspan="3">No video watched records.</td></tr>'}</tbody></table></div><h4>Paper Activity</h4><div class="table-wrap"><table><thead><tr><th>Date</th><th>Department</th><th>Paper</th><th>Marks</th></tr></thead><tbody>${attempts.map(a=>`<tr><td>${new Date(a.date).toLocaleString()}</td><td>${esc(a.dept)}</td><td>${esc(a.paperTitle)}</td><td><b>${a.correct}/${a.total} (${a.score}%)</b></td></tr>`).join('')||'<tr><td colspan="4">No paper attempts.</td></tr>'}</tbody></table></div>`}
function exportSingleUserPDF(username){const r=userStats(username);const {jsPDF}=window.jspdf;const doc=new jsPDF();let y=18;doc.setFontSize(16);doc.text('AVSEC LMS - User Activity',14,y);y+=12;doc.setFontSize(10);doc.text(`User: ${r.user.displayName||r.user.username} (${r.user.username})`,14,y);y+=7;doc.text(`Access: ${(r.user.pages||[]).join(', ')||'-'}`,14,y);y+=10;doc.setFontSize(12);doc.text('Videos Watched',14,y);y+=7;doc.setFontSize(9);r.views.forEach(v=>{if(y>275){doc.addPage();y=18}doc.text(`- ${v.dept} | ${v.videoTitle} | ${new Date(v.date).toLocaleString()}`,16,y);y+=5});y+=5;doc.setFontSize(12);doc.text('Paper Attempts',14,y);y+=7;doc.setFontSize(9);r.attempts.forEach(a=>{if(y>275){doc.addPage();y=18}doc.text(`- ${a.dept} | ${a.paperTitle} | ${a.correct}/${a.total} (${a.score}%) | ${new Date(a.date).toLocaleString()}`,16,y);y+=5});doc.save(`${username}_Activity.pdf`)}
function exportActivityPDF(){const {jsPDF}=window.jspdf;const doc=new jsPDF();let y=18;doc.setFontSize(16);doc.text('AVSEC LMS - User Activity Summary',14,y);y+=12;doc.setFontSize(9);state.users.forEach(u=>{if(y>270){doc.addPage();y=18}const views=state.videoViews.filter(v=>v.user===u.username);const attempts=state.attempts.filter(a=>a.user===u.username);doc.text(`User: ${u.displayName||u.username} (${u.username})`,14,y);y+=6;doc.text(`Access: ${(u.pages||[]).join(', ')||'-'} | Videos watched: ${views.length} | Papers: ${attempts.length}`,14,y);y+=6;attempts.forEach(a=>{doc.text(`- ${a.paperTitle} | ${a.dept} | ${a.correct}/${a.total} (${a.score}%) | ${new Date(a.date).toLocaleString()}`,18,y);y+=5});y+=4});doc.save('AVSEC_LMS_Activity_Summary.pdf')}
function buildPermChecks(){permissionChecks.innerHTML=DEPTS.map(d=>`<label><input type="checkbox" value="${d}"> ${d}</label>`).join('');livePermissionChecks.innerHTML=DEPTS.map(d=>`<label><input type="checkbox" value="${d}"> ${d}</label>`).join('')}
function renderUsers(){setTitle('User Management','Create users and assign page / live class access');$('usersPage').innerHTML=`<div class="card"><button class="primary" onclick="openUserDialog()">Create User</button><div class="table-wrap"><table><thead><tr><th>User</th><th>Display</th><th>Page Access</th><th>Live Access</th><th>Action</th></tr></thead><tbody>${state.users.map((u,i)=>`<tr><td>${esc(u.username)}</td><td>${esc(u.displayName||'')}</td><td>${(u.pages||[]).map(p=>`<span class='pill'>${p}</span>`).join('')||'<span class="muted">None</span>'}</td><td>${(u.livePages||[]).map(p=>`<span class='pill'>🔴 ${p}</span>`).join('')||'<span class="muted">No live assigned</span>'}</td><td><button class="ghost" onclick="openUserDialog(${i})">Edit</button> <button class="danger" onclick="state.users.splice(${i},1);save();renderUsers()">Delete</button></td></tr>`).join('')}</tbody></table></div></div>`}
function openUserDialog(i=null){editingUserIndex=i;buildPermChecks();const u=i!==null?state.users[i]:{username:'',password:'',displayName:'',pages:[],livePages:[]};newUsername.value=u.username;newPassword.value=u.password;newDisplayName.value=u.displayName||'';document.querySelectorAll('#permissionChecks input').forEach(c=>c.checked=(u.pages||[]).includes(c.value));document.querySelectorAll('#livePermissionChecks input').forEach(c=>c.checked=(u.livePages||[]).includes(c.value));userDialog.showModal()}
saveUserBtn.onclick=e=>{e.preventDefault();const pages=[...document.querySelectorAll('#permissionChecks input:checked')].map(c=>c.value);const livePages=[...document.querySelectorAll('#livePermissionChecks input:checked')].map(c=>c.value);const u={username:newUsername.value.trim(),password:newPassword.value,displayName:newDisplayName.value,pages,livePages};if(editingUserIndex!==null)state.users[editingUserIndex]=u;else state.users.push(u);save();userDialog.close();renderUsers()}
function renderSettings(){setTitle('Settings','Google Sheet connected');$('settingsPage').innerHTML=`<div class="grid"><div class="card span-6"><h3>Google Sheet Sync</h3><p class="notice">Connected to Google Sheet. User data, QBank, papers, activity, Drive video links and live class data auto load/save through the configured Apps Script.</p><button class="primary" onclick="cloudLoad().then(()=>{showSync('Google Sheet refreshed');showPage('dashboard')})">Refresh Now</button></div><div class="card span-6"><h3>Backup / Restore</h3><p class="muted">Download full backup JSON and import it later to restore all users, videos, QBank, papers, activity records, settings and live classes.</p><div class="toolbar"><button class="ghost" onclick="downloadBackup()">Download Full Backup JSON</button></div><label>Import Backup JSON</label><input type="file" id="backupImportFile" accept=".json,application/json"><div class="toolbar"><button class="primary" onclick="importBackup()">Import & Restore Data</button></div><p class="notice">Important: Import will replace current browser data. After restore, data will auto sync to Google Sheet if connected.</p><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h3>Reset</h3><button class="danger" onclick="if(confirm('Reset local browser data only? Google Sheet data will remain saved.')){localStorage.removeItem(LS);load();showPage('dashboard')}">Clear Local Cache</button></div></div>`}
function backupFileName(){const d=new Date();const pad=n=>String(n).padStart(2,'0');return `AVSEC_LMS_Full_Backup_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}.json`}
function downloadBackup(){const backup={app:'AVSEC_LMS',version:'V3',exportedAt:new Date().toISOString(),state};download(backupFileName(),JSON.stringify(backup,null,2),'application/json')}
function importBackup(){const f=$('backupImportFile')?.files?.[0];if(!f)return alert('Select backup JSON file first');if(!confirm('Restore this backup? Current local data will be replaced.'))return;const r=new FileReader();r.onload=e=>{try{const data=JSON.parse(e.target.result);const restored=data.state||data;if(!restored||typeof restored!=='object')throw new Error('Invalid backup file');state=restored;normalize();localSave();scheduleCloudSave();showSync('Backup restored');alert('Backup restored successfully');showPage('dashboard')}catch(err){alert('Invalid backup file. Please select the AVSEC LMS backup JSON file.')}};r.readAsText(f)}
function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click()}
init();

  </script>

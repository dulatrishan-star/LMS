:root{--bg:#08111f;--panel:#0e1e32;--panel2:#132844;--line:#233d5c;--text:#edf6ff;--muted:#9db5cc;--accent:#2ed3ff;--gold:#f8c245;--danger:#ff6678;--ok:#47df9a}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#07101d,#0a2743 60%,#051020);color:var(--text)}
.hidden{display:none!important}.login-screen{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 0%,#15416a,transparent 35%),radial-gradient(circle at 90% 20%,#32536d,transparent 30%),#07101d}.login-card{width:min(460px,100%);background:rgba(14,30,50,.92);border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:0 24px 70px #0009}.brand-row{display:flex;gap:18px;align-items:center;margin-bottom:22px}.brand-row img,.side-brand img{width:62px;height:62px}.brand-row h1{margin:0;font-size:34px}.brand-row p{margin:4px 0;color:var(--muted)}label{display:block;margin:12px 0 7px;color:#cbe4f6;font-weight:650}input,select,textarea{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:#071626;color:var(--text);outline:none}textarea{min-height:96px;resize:vertical}.primary,.ghost,.danger{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#4e8dff);color:#001225}.ghost{background:#132844;color:var(--text);border:1px solid var(--line)}.danger{background:var(--danger);color:white}.login-card .primary{width:100%;margin-top:16px}.login-tabs{display:flex;background:#071626;border-radius:14px;padding:5px}.login-tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:10px;font-weight:800;cursor:pointer}.login-tabs .active{background:var(--panel2);color:var(--text)}.msg{color:var(--danger);min-height:20px}.demo-box{background:#081b2e;border:1px dashed var(--line);border-radius:14px;padding:12px;color:var(--muted);font-size:13px}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{background:rgba(8,17,31,.94);border-right:1px solid var(--line);padding:20px;position:sticky;top:0;height:100vh}.side-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.side-brand small{display:block;color:var(--gold);margin-top:3px}nav{display:grid;gap:8px}nav button{background:transparent;color:var(--muted);border:1px solid transparent;padding:12px 14px;border-radius:14px;text-align:left;font-weight:750;cursor:pointer}nav button:hover,nav button.active{background:var(--panel);border-color:var(--line);color:var(--text)}#logoutBtn{position:absolute;bottom:20px;left:20px;right:20px}.main{padding:22px;overflow:auto}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;background:rgba(14,30,50,.75);border:1px solid var(--line);border-radius:22px;padding:18px 22px}.topbar h2{margin:0}.topbar p{margin:5px 0 0;color:var(--muted)}.user-chip{background:#071626;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--gold)}.page{display:none}.page.active{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:rgba(14,30,50,.85);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 16px 40px #0003}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}.stat{font-size:34px;font-weight:900;color:var(--accent)}.muted{color:var(--muted)}.dept-card{cursor:pointer;transition:.2s}.dept-card:hover{transform:translateY(-3px);border-color:var(--accent)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{color:#bfeaff;background:#0b1b2e}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#071626;border:1px solid var(--line);margin:2px;color:#cbe4f6}.video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.video-card video{width:100%;border-radius:14px;background:#000;max-height:220px}.question-list{display:grid;gap:10px}.question-item{background:#071626;border:1px solid var(--line);border-radius:16px;padding:14px}.answer{color:var(--ok);font-weight:800}.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;background:#071626;border:1px solid var(--line);border-radius:12px;padding:10px}.check-grid label{margin:0;display:flex;gap:8px;align-items:center;font-weight:600}.check-grid input{width:auto}dialog{border:0;border-radius:22px;background:var(--panel);color:var(--text);width:min(560px,95%)}.dialog-card{padding:10px}menu{display:flex;justify-content:flex-end;gap:10px;padding:0;margin-top:18px}.notice{border-left:4px solid var(--gold);padding:12px;background:#1b2530;border-radius:12px;color:#f6df9f}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.main{padding:14px}.grid>*{grid-column:span 12!important}#logoutBtn{position:static;margin-top:12px;width:100%}.topbar{display:block}.user-chip{display:inline-block;margin-top:12px}}
.video-card iframe{width:100%;height:240px;border:0;border-radius:14px;background:#000}.question-item label{display:block;margin:6px 0}.notice h3{margin-top:0}.toolbar input{max-width:220px}
.click-row{cursor:pointer}.click-row:hover{background:#132844;color:var(--text)}.active-row{background:#183b5f!important;color:var(--text)}.active-row small{color:var(--muted)}.sync-status{position:fixed;right:18px;bottom:18px;background:#0b3b63;color:#fff;padding:10px 14px;border-radius:12px;box-shadow:0 8px 24px #0003;opacity:0;transform:translateY(10px);transition:.25s;z-index:99}.sync-status.show{opacity:1;transform:translateY(0)}

  <script>
// Final Google Apps Script Web App URL for AVSEC LMS.
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlGeELazMLWrWwH5-xrCu64JIHOV3Bezgp3LvbGJHlXfffXq6VgoBNuBJe1h8wMty9_Q/exec';

  <script>
const DEPTS=['Engineering','Utility','Ramp','AIS','Cabin Crew','Security'];
const LS='AVSEC_LMS_DATA_V3';
let loginType='admin', state, session=null, selectedDept='AIS', editingUserIndex=null, activePaper=null;
const $=id=>document.getElementById(id);
function defaultState(){return{live:{title:'AVSEC Live Class',link:'',note:'Live class is visible to all users.'},users:[],videos:{},qbank:{},papers:{},attempts:[],videoViews:[],settings:{appsScriptUrl:(typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:''),org:'Aviation Security Department'}}}
function normalize(){DEPTS.forEach(d=>{state.videos[d]??=[];state.qbank[d]??=[];state.papers[d]??=[]});state.attempts??=[];state.videoViews??=[];state.users??=[];state.live??={title:'AVSEC Live Class',link:'',note:''};state.settings??={};state.settings.appsScriptUrl ||= (typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:'')}
function load(){state=JSON.parse(localStorage.getItem(LS)||'null')||defaultState();normalize();localSave()}
function localSave(){localStorage.setItem(LS,JSON.stringify(state))}
let syncTimer=null;
function save(){localSave(); scheduleCloudSave()}
function gasUrl(){return (state?.settings?.appsScriptUrl || (typeof APPS_SCRIPT_URL!=='undefined'?APPS_SCRIPT_URL:'')).trim()}
async function api(action,payload={}){const url=gasUrl(); if(!url) return null; const res=await fetch(url,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})}); const data=await res.json(); if(!data.ok) throw new Error(data.error||'Google Sheet API error'); return data}
async function cloudLoad(){try{const data=await api('loadAll'); if(data&&data.state){state=data.state; normalize(); localSave(); return true}}catch(e){console.warn('Cloud load failed',e); return false}}
function scheduleCloudSave(){if(!gasUrl())return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>cloudSave(),800)}
async function cloudSave(){try{await api('saveAll',{state}); showSync('Google Sheet synced')}catch(e){console.warn('Cloud save failed',e); showSync('Google Sheet sync failed')}}
function showSync(t){let el=document.getElementById('syncStatus'); if(!el){el=document.createElement('div');el.id='syncStatus';el.className='sync-status';document.body.appendChild(el)} el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
async function init(){load(); await cloudLoad(); document.querySelectorAll('[data-login-type]').forEach(b=>b.onclick=()=>{loginType=b.dataset.loginType;document.querySelectorAll('[data-login-type]').forEach(x=>x.classList.toggle('active',x===b));$('username').placeholder='Username'});$('loginForm').onsubmit=login;$('logoutBtn').onclick=()=>{session=null;$('app').classList.add('hidden');$('loginScreen').classList.remove('hidden')};buildPermChecks()}
function login(e){e.preventDefault();const u=$('username').value.trim(),p=$('password').value;if(loginType==='admin'&&u==='Admin'&&p==='Airbus@24'){session={role:'admin',name:'Admin',username:'Admin',pages:DEPTS};afterLogin();return}const user=state.users.find(x=>x.username===u&&x.password===p);if(user){session={role:'user',name:user.displayName||user.username,username:user.username,pages:user.pages||[]};afterLogin();return}$('loginMsg').textContent='Invalid username or password'}
function afterLogin(){$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');$('roleBadge').textContent=session.role.toUpperCase();$('currentUserChip').textContent=session.name;renderNav();showPage('dashboard')}
function navBtn(key,label){return `<button data-page="${key}">${label}</button>`}
function renderNav(){let html=navBtn('dashboard','📊 Dashboard')+navBtn('live','🔴 Live Class');session.pages.forEach(d=>html+=`<button data-page="dept:${d}">🎓 ${d}</button>`);html+=navBtn('paper','📝 Papers');if(session.role==='admin')html+=navBtn('qbank','📚 QBank')+navBtn('activity','📈 Activity Summary')+navBtn('users','👥 Users')+navBtn('settings','⚙️ Settings');$('mainNav').innerHTML=html;document.querySelectorAll('#mainNav button').forEach(b=>b.onclick=()=>{const p=b.dataset.page;if(p.startsWith('dept:')){selectedDept=p.split(':')[1];showPage('dept')}else showPage(p)})}
function setTitle(t,s){$('pageTitle').textContent=t;$('pageSub').textContent=s||''}
function page(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(id+'Page').classList.add('active')}
function showPage(id){({dashboard:renderDashboard,live:renderLive,dept:renderDept,qbank:renderQbank,paper:renderPaper,activity:renderActivity,users:renderUsers,settings:renderSettings}[id]||renderDashboard)();page(id)}
function renderDashboard(){setTitle('Dashboard','Training overview');const totalQ=DEPTS.reduce((a,d)=>a+state.qbank[d].length,0),totalV=DEPTS.reduce((a,d)=>a+state.videos[d].length,0),done=state.attempts.filter(a=>a.user===session.username).length;$('dashboardPage').innerHTML=`<div class="grid"><div class="card span-3"><div class="stat">${session.pages.length}</div><b>Accessible Pages</b></div><div class="card span-3"><div class="stat">${totalV}</div><b>Videos</b></div><div class="card span-3"><div class="stat">${totalQ}</div><b>QBank Questions</b></div><div class="card span-3"><div class="stat">${session.role==='admin'?state.users.length:done}</div><b>${session.role==='admin'?'Users':'Papers Done'}</b></div><div class="card span-12"><h3>Department Pages</h3><div class="grid">${session.pages.map(d=>`<div class="card span-4 dept-card" onclick="selectedDept='${d}';showPage('dept')"><h3>${d}</h3><p class="muted">Videos: ${state.videos[d].length} | Papers: ${state.papers[d].length}</p></div>`).join('')}</div></div></div>`}
function renderLive(){setTitle('Live Class','Visible to all users');const admin=session.role==='admin';$('livePage').innerHTML=`<div class="grid"><div class="card span-8"><h3>${esc(state.live.title)}</h3><p class="notice">${esc(state.live.note)}</p>${state.live.link?`<p><a class="primary" href="${esc(state.live.link)}" target="_blank">Join Live Class</a></p>`:'<p class="muted">No live class link added yet.</p>'}</div>${admin?`<div class="card span-4"><h3>Update Live Class</h3><label>Title</label><input id="liveTitle" value="${esc(state.live.title)}"><label>Meeting Link</label><input id="liveLink" value="${esc(state.live.link)}"><label>Note</label><textarea id="liveNote">${esc(state.live.note)}</textarea><button class="primary" onclick="state.live={title:liveTitle.value,link:liveLink.value,note:liveNote.value};save();renderLive()">Save</button></div>`:''}</div>`}
function drivePreview(link){let m=String(link).match(/\/d\/([^/]+)/)||String(link).match(/[?&]id=([^&]+)/);return m?`https://drive.google.com/file/d/${m[1]}/preview`:link}
function renderDept(){setTitle(selectedDept,`${selectedDept} video library`);const admin=session.role==='admin';$('deptPage').innerHTML=`<div class="card"><div class="toolbar"><button class="ghost" onclick="showPage('paper')">Open Papers</button>${admin?`<button class="ghost" onclick="showPage('qbank')">Open QBank</button>`:''}</div>${admin?`<h3>Add Google Drive Video</h3><label>Video Title</label><input id="videoTitle" placeholder="Training video title"><label>Google Drive Share Link / Preview Link</label><input id="videoLink" placeholder="https://drive.google.com/file/d/.../view"><button class="primary" onclick="addVideoLink()">Add Video</button><p class="muted">Drive file permission must be “Anyone with the link can view”.</p>`:''}<h3>Videos</h3><div class="video-grid">${state.videos[selectedDept].map((v,i)=>`<div class="card video-card"><iframe src="${esc(drivePreview(v.link))}" allow="autoplay" allowfullscreen></iframe><h4>${esc(v.title)}</h4><p class="muted">${new Date(v.date).toLocaleString()}</p><button class="ghost" onclick="markVideoWatched('${selectedDept}',${i})">Mark as Watched</button>${admin?` <button class="danger" onclick="state.videos['${selectedDept}'].splice(${i},1);save();renderDept()">Delete</button>`:''}</div>`).join('')||'<p class="muted">No videos added.</p>'}</div></div>`}
function addVideoLink(){if(!videoLink.value.trim())return alert('Paste Drive video link');state.videos[selectedDept].push({title:videoTitle.value||'Training Video',link:videoLink.value.trim(),date:Date.now()});save();renderDept()}
function markVideoWatched(dept,i){if(!session||session.role==='admin')return alert('Login as user to save watching activity');state.videoViews.push({user:session.username,name:session.name,dept,videoTitle:state.videos[dept][i].title,date:Date.now()});save();alert('Video watched activity saved')}
function renderQbank(){setTitle('QBank Manager','Import, edit, shuffle and create papers');const depts=DEPTS;if(!depts.includes(selectedDept))selectedDept=depts[0];$('qbankPage').innerHTML=`<div class="grid"><div class="card span-4"><label>Department</label><select id="qbDept" onchange="selectedDept=this.value;renderQbank()">${depts.map(d=>`<option ${d===selectedDept?'selected':''}>${d}</option>`).join('')}</select><h3>Add Question</h3><label>Question</label><textarea id="qText"></textarea><label>A</label><input id="opA"><label>B</label><input id="opB"><label>C</label><input id="opC"><label>D</label><input id="opD"><label>Correct Answer</label><select id="ans"><option>A</option><option>B</option><option>C</option><option>D</option></select><button class="primary" onclick="addQuestion()">Add Question</button></div><div class="card span-8"><div class="toolbar"><input type="file" id="importFile" accept=".csv,.xlsx,.xls,.docx,.txt"><button class="ghost" onclick="importQuestions()">Import Word/Excel</button><input id="paperCount" type="number" min="1" placeholder="Paper question count"><input id="paperTitle" placeholder="Paper title"><button class="primary" onclick="createPaper()">Shuffle & Create Tick-off Paper</button><button class="ghost" onclick="exportPaperWord()">Export Paper Word</button></div><p class="muted">Answer is visible only inside Admin QBank. Paper export does not include answer key.</p><h3>${selectedDept} QBank (${state.qbank[selectedDept].length})</h3>${state.qbank[selectedDept].map((q,i)=>`<div class="question-item"><b>${i+1}. ${esc(q.question)}</b><p>A. ${esc(q.A)}<br>B. ${esc(q.B)}<br>C. ${esc(q.C)}<br>D. ${esc(q.D)}</p><p class="answer">Admin Answer: ${esc(q.answer)}</p><button class="ghost" onclick="editQuestion(${i})">Edit</button> <button class="danger" onclick="state.qbank['${selectedDept}'].splice(${i},1);save();renderQbank()">Delete</button></div>`).join('')||'<p class="muted">No questions.</p>'}</div></div>`}
function addQuestion(){if(!qText.value.trim())return;state.qbank[selectedDept].push({id:crypto.randomUUID(),question:qText.value,A:opA.value,B:opB.value,C:opC.value,D:opD.value,answer:ans.value});save();renderQbank()}
function editQuestion(i){const q=state.qbank[selectedDept][i];const nq=prompt('Edit question',q.question);if(nq!==null){q.question=nq;const na=prompt('Correct Answer A/B/C/D',q.answer);q.answer=(na||q.answer).toUpperCase()[0];save();renderQbank()}}
function parseRows(rows){rows.forEach(r=>{let a=Array.isArray(r)?r:Object.values(r);if(a.length>=6&&String(a[0]).toLowerCase()!=='question')state.qbank[selectedDept].push({id:crypto.randomUUID(),question:a[0]||'',A:a[1]||'',B:a[2]||'',C:a[3]||'',D:a[4]||'',answer:String(a[5]||'A').trim().toUpperCase()[0]})})}
function importQuestions(){const f=importFile.files[0];if(!f)return alert('Select file');const ext=f.name.split('.').pop().toLowerCase();const r=new FileReader();r.onload=async e=>{if(['xlsx','xls'].includes(ext)&&window.XLSX){const wb=XLSX.read(e.target.result,{type:'array'});parseRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}))}else{let text=e.target.result;if(ext==='docx'&&window.mammoth){let res=await mammoth.extractRawText({arrayBuffer:e.target.result});text=res.value}parseRows(String(text).split(/\n+/).map(l=>l.split('|').map(x=>x.trim())))}save();renderQbank()};(['xlsx','xls','docx'].includes(ext))?r.readAsArrayBuffer(f):r.readAsText(f)}
function shuffledQuestions(count){return [...state.qbank[selectedDept]].sort(()=>Math.random()-.5).slice(0,Math.min(count,state.qbank[selectedDept].length))}
function createPaper(){const count=Number(paperCount.value)||10;const qs=shuffledQuestions(count);if(!qs.length)return alert('No questions in QBank');state.papers[selectedDept].push({id:crypto.randomUUID(),title:paperTitle.value||`${selectedDept} Paper`,dept:selectedDept,created:Date.now(),questions:qs.map(q=>q.id)});save();alert('Paper created and available for assigned users');renderQbank()}
function getPaperQs(p){return p.questions.map(id=>state.qbank[p.dept].find(q=>q.id===id)).filter(Boolean)}
function exportPaperWord(){const count=Number(paperCount?.value)||state.qbank[selectedDept].length;const qs=shuffledQuestions(count);let html=`<html><head><meta charset='utf-8'></head><body><h1>${esc(selectedDept)} Question Paper</h1>${qs.map((q,i)=>`<p><b>${i+1}. ${esc(q.question)}</b><br>A. ${esc(q.A)}<br>B. ${esc(q.B)}<br>C. ${esc(q.C)}<br>D. ${esc(q.D)}</p>`).join('')}</body></html>`;download(`${selectedDept}_Question_Paper_No_Answers.doc`,html,'application/msword')}
function renderPaper(){setTitle('Papers','User tick-off papers and instant marking');const depts=session.role==='admin'?DEPTS:session.pages;if(!depts.includes(selectedDept))selectedDept=depts[0];const papers=depts.flatMap(d=>state.papers[d].map(p=>({...p,dept:d})));$('paperPage').innerHTML=`<div class="card"><label>Department</label><select onchange="selectedDept=this.value;renderPaper()">${depts.map(d=>`<option ${d===selectedDept?'selected':''}>${d}</option>`).join('')}</select><h3>Available Papers</h3>${state.papers[selectedDept].map((p,i)=>`<div class="question-item"><b>${esc(p.title)}</b><p class="muted">${p.dept} | Questions: ${p.questions.length} | ${new Date(p.created).toLocaleString()}</p><button class="primary" onclick="startPaper('${p.id}')">Open Paper</button>${session.role==='admin'?` <button class="danger" onclick="state.papers['${selectedDept}'].splice(${i},1);save();renderPaper()">Delete</button>`:''}</div>`).join('')||'<p class="muted">No papers created yet.</p>'}</div><div id="paperWork"></div>`}
function startPaper(id){const p=state.papers[selectedDept].find(x=>x.id===id);activePaper=p;const qs=getPaperQs(p);$('paperWork').innerHTML=`<div class="card"><h3>${esc(p.title)}</h3><form id="attemptForm">${qs.map((q,i)=>`<div class="question-item"><b>${i+1}. ${esc(q.question)}</b>${['A','B','C','D'].map(o=>`<label><input type="radio" name="q${i}" value="${o}" required> ${o}. ${esc(q[o])}</label>`).join('')}</div>`).join('')}<button class="primary">Submit Paper</button></form><div id="markResult"></div></div>`;$('attemptForm').onsubmit=submitPaper}
function submitPaper(e){e.preventDefault();if(session.role==='admin')return alert('Login as user to attempt paper');const qs=getPaperQs(activePaper);let correct=0,answers=[];qs.forEach((q,i)=>{const a=document.querySelector(`[name=q${i}]:checked`).value;answers.push({qid:q.id,selected:a,correct:q.answer});if(a===q.answer)correct++});const score=Math.round((correct/qs.length)*100);const rec={id:crypto.randomUUID(),user:session.username,name:session.name,dept:activePaper.dept,paperId:activePaper.id,paperTitle:activePaper.title,total:qs.length,correct,score,answers,date:Date.now()};state.attempts.push(rec);save();$('markResult').innerHTML=`<div class="notice"><h3>Result: ${correct}/${qs.length} (${score}%)</h3><button class="ghost" onclick="downloadMarkSheet('${rec.id}')">Download Mark Sheet PDF</button></div>`}
function downloadMarkSheet(id){const r=state.attempts.find(a=>a.id===id);const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(16);doc.text('AVSEC LMS - Mark Sheet',14,18);doc.setFontSize(11);let y=32;[['Name',r.name],['Username',r.user],['Department',r.dept],['Paper',r.paperTitle],['Date',new Date(r.date).toLocaleString()],['Score',`${r.correct}/${r.total} (${r.score}%)`]].forEach(row=>{doc.text(`${row[0]}: ${row[1]}`,14,y);y+=8});doc.save(`${r.user}_${r.paperTitle}_MarkSheet.pdf`)}
let selectedActivityUser=null;
function userStats(username){return{user:state.users.find(u=>u.username===username)||{username,displayName:username,pages:[]},views:state.videoViews.filter(v=>v.user===username),attempts:state.attempts.filter(a=>a.user===username)}}
function renderActivity(){setTitle('Activity Summary','Click a user name to load full activity');const rows=state.users.map(u=>userStats(u.username));const first=selectedActivityUser||rows[0]?.user.username;const detail=first?userStats(first):null;$('activityPage').innerHTML=`<div class="grid"><div class="card span-5"><div class="toolbar"><button class="primary" onclick="exportActivityPDF()">Export Summary PDF</button><button class="ghost" onclick="cloudLoad().then(()=>renderActivity())">Refresh from Google Sheet</button></div><h3>Users</h3><div class="table-wrap"><table><thead><tr><th>User Name</th><th>Videos</th><th>Papers</th><th>Avg</th></tr></thead><tbody>${rows.map(r=>{const avg=r.attempts.length?Math.round(r.attempts.reduce((a,b)=>a+b.score,0)/r.attempts.length):0;return `<tr class="click-row ${first===r.user.username?'active-row':''}" onclick="selectedActivityUser='${esc(r.user.username)}';renderActivity()"><td><b>${esc(r.user.displayName||r.user.username)}</b><br><small>${esc(r.user.username)}</small></td><td>${r.views.length}</td><td>${r.attempts.length}</td><td>${r.attempts.length?avg+'%':'-'}</td></tr>`}).join('')}</tbody></table></div></div><div class="card span-7">${detail?renderUserActivityDetail(detail):'<p class="muted">No users created yet.</p>'}</div></div>`}
function renderUserActivityDetail(r){return `<div class="toolbar"><div><h3>${esc(r.user.displayName||r.user.username)}</h3><p class="muted">${esc(r.user.username)} | Access: ${(r.user.pages||[]).join(', ')||'-'}</p></div><button class="ghost" onclick="exportSingleUserPDF('${esc(r.user.username)}')">Export This User PDF</button></div><h4>Video Activity</h4><div class="table-wrap"><table><thead><tr><th>Date</th><th>Department</th><th>Video</th></tr></thead><tbody>${r.views.map(v=>`<tr><td>${new Date(v.date).toLocaleString()}</td><td>${esc(v.dept)}</td><td>${esc(v.videoTitle)}</td></tr>`).join('')||'<tr><td colspan="3">No video watched records.</td></tr>'}</tbody></table></div><h4>Paper Activity</h4><div class="table-wrap"><table><thead><tr><th>Date</th><th>Department</th><th>Paper</th><th>Marks</th></tr></thead><tbody>${r.attempts.map(a=>`<tr><td>${new Date(a.date).toLocaleString()}</td><td>${esc(a.dept)}</td><td>${esc(a.paperTitle)}</td><td><b>${a.correct}/${a.total} (${a.score}%)</b></td></tr>`).join('')||'<tr><td colspan="4">No paper attempts.</td></tr>'}</tbody></table></div>`}
function exportSingleUserPDF(username){const r=userStats(username);const {jsPDF}=window.jspdf;const doc=new jsPDF();let y=18;doc.setFontSize(16);doc.text('AVSEC LMS - User Activity',14,y);y+=12;doc.setFontSize(10);doc.text(`User: ${r.user.displayName||r.user.username} (${r.user.username})`,14,y);y+=7;doc.text(`Access: ${(r.user.pages||[]).join(', ')||'-'}`,14,y);y+=10;doc.setFontSize(12);doc.text('Videos Watched',14,y);y+=7;doc.setFontSize(9);r.views.forEach(v=>{if(y>275){doc.addPage();y=18}doc.text(`- ${v.dept} | ${v.videoTitle} | ${new Date(v.date).toLocaleString()}`,16,y);y+=5});y+=5;doc.setFontSize(12);doc.text('Paper Attempts',14,y);y+=7;doc.setFontSize(9);r.attempts.forEach(a=>{if(y>275){doc.addPage();y=18}doc.text(`- ${a.dept} | ${a.paperTitle} | ${a.correct}/${a.total} (${a.score}%) | ${new Date(a.date).toLocaleString()}`,16,y);y+=5});doc.save(`${username}_Activity.pdf`)}
function exportActivityPDF(){const {jsPDF}=window.jspdf;const doc=new jsPDF();let y=18;doc.setFontSize(16);doc.text('AVSEC LMS - User Activity Summary',14,y);y+=12;doc.setFontSize(9);state.users.forEach(u=>{if(y>270){doc.addPage();y=18}const views=state.videoViews.filter(v=>v.user===u.username);const attempts=state.attempts.filter(a=>a.user===u.username);doc.text(`User: ${u.displayName||u.username} (${u.username})`,14,y);y+=6;doc.text(`Access: ${(u.pages||[]).join(', ')||'-'} | Videos watched: ${views.length} | Papers: ${attempts.length}`,14,y);y+=6;attempts.forEach(a=>{doc.text(`- ${a.paperTitle} | ${a.dept} | ${a.correct}/${a.total} (${a.score}%) | ${new Date(a.date).toLocaleString()}`,18,y);y+=5});y+=4});doc.save('AVSEC_LMS_Activity_Summary.pdf')}
function buildPermChecks(){permissionChecks.innerHTML=DEPTS.map(d=>`<label><input type="checkbox" value="${d}"> ${d}</label>`).join('')}
function renderUsers(){setTitle('User Management','Create users and assign page access');$('usersPage').innerHTML=`<div class="card"><button class="primary" onclick="openUserDialog()">Create User</button><div class="table-wrap"><table><thead><tr><th>User</th><th>Display</th><th>Access</th><th>Action</th></tr></thead><tbody>${state.users.map((u,i)=>`<tr><td>${esc(u.username)}</td><td>${esc(u.displayName||'')}</td><td>${(u.pages||[]).map(p=>`<span class='pill'>${p}</span>`).join('')}</td><td><button class="ghost" onclick="openUserDialog(${i})">Edit</button> <button class="danger" onclick="state.users.splice(${i},1);save();renderUsers()">Delete</button></td></tr>`).join('')}</tbody></table></div></div>`}
function openUserDialog(i=null){editingUserIndex=i;buildPermChecks();const u=i!==null?state.users[i]:{username:'',password:'',displayName:'',pages:[]};newUsername.value=u.username;newPassword.value=u.password;newDisplayName.value=u.displayName||'';document.querySelectorAll('#permissionChecks input').forEach(c=>c.checked=(u.pages||[]).includes(c.value));userDialog.showModal()}
saveUserBtn.onclick=e=>{e.preventDefault();const pages=[...document.querySelectorAll('#permissionChecks input:checked')].map(c=>c.value);const u={username:newUsername.value.trim(),password:newPassword.value,displayName:newDisplayName.value,pages};if(editingUserIndex!==null)state.users[editingUserIndex]=u;else state.users.push(u);save();userDialog.close();renderUsers()}
function renderSettings(){setTitle('Settings','Google Sheet connected');$('settingsPage').innerHTML=`<div class="grid"><div class="card span-6"><h3>Google Sheet Sync</h3><p class="notice">Connected to Google Sheet. User data, QBank, papers, activity, Drive video links and live class links auto load/save through the configured Apps Script.</p><button class="primary" onclick="cloudLoad().then(()=>{showSync('Google Sheet refreshed');showPage('dashboard')})">Refresh Now</button></div><div class="card span-6"><h3>Backup / Reset</h3><button class="ghost" onclick="downloadBackup()">Download Backup JSON</button><button class="danger" onclick="if(confirm('Reset local browser data only? Google Sheet data will remain saved.')){localStorage.removeItem(LS);load();showPage('dashboard')}">Clear Local Cache</button></div></div>`}
function downloadBackup(){download('AVSEC_LMS_Backup.json',JSON.stringify(state,null,2),'application/json')}
function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click()}
init();

  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AVSEC LMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#07111f;--card:#0f1d33;--card2:#132541;--text:#eef5ff;--muted:#9fb3ca;--brand:#2dd4bf;--brand2:#38bdf8;--danger:#ef4444;--warn:#f59e0b;--ok:#22c55e;--line:#243852}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#17365f,#07111f 45%,#030712);color:var(--text);min-height:100vh}.hidden{display:none!important}.loginWrap{min-height:100vh;display:grid;place-items:center;padding:22px}.loginCard{width:min(440px,95vw);background:rgba(15,29,51,.92);border:1px solid var(--line);box-shadow:0 20px 70px #0008;border-radius:26px;padding:28px}.logoRow{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-weight:900;color:#00131c}.sub{color:var(--muted);font-size:14px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;background:#081528;border:1px solid #29415f;color:var(--text);border-radius:12px;padding:11px 12px;outline:none}textarea{min-height:90px;resize:vertical}.field{margin:13px 0}.btn{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#00131c}.btn.sec{background:#1e3554;color:var(--text);border:1px solid #365475}.btn.danger{background:var(--danger);color:white}.btn.warn{background:var(--warn);color:#1a1000}.btn.ok{background:var(--ok);color:#001706}.btn.small{padding:7px 10px;font-size:13px}.topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line);background:rgba(7,17,31,.86);backdrop-filter:blur(10px);position:sticky;top:0;z-index:5}.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 64px)}.side{border-right:1px solid var(--line);background:rgba(8,21,40,.82);padding:16px}.navBtn{width:100%;text-align:left;margin:5px 0;background:transparent;color:var(--text);border:1px solid transparent;border-radius:12px;padding:11px 12px;cursor:pointer}.navBtn:hover,.navBtn.active{background:#10233e;border-color:#28496e}.main{padding:22px;overflow:auto}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:rgba(15,29,51,.88);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 10px 35px #0004}.col6{grid-column:span 6}.col4{grid-column:span 4}.col8{grid-column:span 8}.col12{grid-column:span 12}.title{font-size:26px;font-weight:900;margin:0 0 6px}.pill{display:inline-flex;gap:7px;align-items:center;border:1px solid #345475;background:#0b1b31;border-radius:999px;padding:6px 10px;color:#cfe4ff;font-size:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{border-bottom:1px solid #263d59;padding:10px;text-align:left;vertical-align:top}.table th{color:#c7dcf5;background:#0b1b31}.videoFrame{width:100%;aspect-ratio:16/9;border:0;border-radius:16px;background:#020617}.qOption{display:block;margin:8px 0;padding:11px;border:1px solid #2d4666;border-radius:12px;background:#0b1b31}.notice{padding:12px;border-radius:12px;background:#0b1b31;border:1px solid #2c486a;color:#cfe4ff}.toast{position:fixed;right:18px;bottom:18px;background:#0b1b31;border:1px solid #385a81;border-radius:14px;padding:12px 14px;box-shadow:0 10px 40px #0009;z-index:99}.processOverlay{position:fixed;inset:0;background:rgba(3,7,18,.78);backdrop-filter:blur(8px);z-index:9999;display:grid;place-items:center}.processBox{width:min(430px,92vw);background:#0f1d33;border:1px solid #38bdf8;border-radius:22px;padding:26px;text-align:center;box-shadow:0 25px 80px #000}.spin{width:48px;height:48px;margin:0 auto 15px;border-radius:50%;border:5px solid #1e3554;border-top-color:#2dd4bf;animation:rot 1s linear infinite}@keyframes rot{to{transform:rotate(360deg)}}.userLink{color:#67e8f9;cursor:pointer;text-decoration:underline}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static}.col6,.col4,.col8{grid-column:span 12}.split{grid-template-columns:1fr}.topbar{height:auto;gap:10px;flex-wrap:wrap;padding:12px}.main{padding:14px}}

/* Fix selected/clicked user row white highlight */
.userLink,.userRow,.summaryUserRow,tr.userRow,tbody tr{color:var(--text);}
.userLink:focus,.userLink:active,.userLink:hover,
.userRow:focus,.userRow:active,.userRow:hover,
.summaryUserRow:focus,.summaryUserRow:active,.summaryUserRow:hover,
tr.userRow:focus,tr.userRow:active,tr.userRow:hover,
.table tr:focus,.table tr:active{background:#10233e!important;color:var(--text)!important;outline:1px solid #38bdf8;}
.notice.userLink{background:#0b1b31!important;color:#dff7ff!important;border-color:#2c486a;}
.notice.userLink:hover,.notice.userLink:active,.notice.userLink:focus{background:#143050!important;color:#ffffff!important;}
::selection{background:#2563eb;color:#ffffff;}
button:focus,input:focus,select:focus,textarea:focus{box-shadow:0 0 0 2px rgba(56,189,248,.35);}
</style>
</head>
<body>
<div id="login" class="loginWrap">
  <div class="loginCard">
    <div class="logoRow"><div class="logo">AV</div><div><h1 style="margin:0">AVSEC LMS</h1><div class="sub">Aviation Security Training Portal</div></div></div>
    <div class="notice" id="syncStatus">Connecting Google Sheet...</div>
    <div class="field"><label>Username</label><input id="loginUser" autocomplete="username" placeholder="Enter username"></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="Enter password"></div>
    <button class="btn" onclick="loginNow()">Login</button>
  </div>
</div>
<div id="app" class="hidden">
  <div class="topbar"><div class="row"><div class="logo">AV</div><div><b>AVSEC LMS</b><div class="sub" id="who"></div></div></div><div class="row"><span class="pill" id="apiPill">Sheet</span><button class="btn sec" onclick="logout()">Logout</button></div></div>
  <div class="app"><aside class="side" id="side"></aside><main class="main" id="main"></main></div>
</div>
<div id="toast" class="toast hidden"></div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyW5FiSk1n7-eb6m9kuFwKkcK9NXSmEpemXNbJwhQz37NBm8KlWEvD7YltZ9JIrIH6aag/exec';
const DEPTS=['Engineering','Utility','Ramp','AIS','Cabin Crew','Security'];
let DB={Users:[],QBank:[],Papers:[],PaperQuestions:[],Attempts:[],Activity:[],Videos:[],LiveClasses:[],Settings:[]};
let current=null, active='Dashboard', online=false;
function uid(p='ID'){return p+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,7)}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2800)}
let processCount=0;function showProcess(msg='Saving data to Google Sheet...'){processCount++;toast(msg)}function hideProcess(){processCount=Math.max(0,processCount-1)}
async function api(action,payload={}){try{let r=await fetch(API_URL+'?action='+encodeURIComponent(action),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});let txt=await r.text();try{return JSON.parse(txt)}catch{return {success:false,error:txt}}}catch(e){return {success:false,error:e.message}}}
async function loadAll(){let st=document.getElementById('syncStatus'); if(st)st.textContent='Connecting Google Sheet...'; let res=await api('loadAll',{}); if(res&&res.success&&res.data){DB={...DB,...res.data}; online=true; document.getElementById('apiPill')?.classList.add('ok'); if(st)st.textContent='Google Sheet connected ✅'; ensureAdmin(false); }else{online=false; if(st)st.textContent='Google Sheet sync failed. Local backup mode.'; ensureAdmin(true);} }
async function saveSheet(sheet,row,msg='Saving data to Google Sheet...'){showProcess(msg);try{let res=await api('save',{sheet,row}); if(!res.success){toast('Google Sheet save failed'); return false} toast('Saved to Google Sheet'); return true}finally{hideProcess()}}
async function updateSheet(sheet,id,row,msg='Updating Google Sheet...'){showProcess(msg);try{let res=await api('update',{sheet,id,row}); if(!res.success){toast('Google Sheet update failed'); return false} toast('Saved to Google Sheet'); return true}finally{hideProcess()}}
async function deleteSheet(sheet,id,msg='Deleting from Google Sheet...'){showProcess(msg);try{let res=await api('delete',{sheet,id}); if(!res.success){toast('Google Sheet delete failed'); return false} toast('Saved to Google Sheet'); return true}finally{hideProcess()}}
function ensureAdmin(local){if(!DB.Users.some(u=>String(u.username).toLowerCase()==='admin')) DB.Users.push({id:'admin',username:'Admin',password:'Airbus@24',role:'admin',pages:DEPTS.join('|'),active:'TRUE'});}
function loginNow(){let u=loginUser.value.trim(),p=loginPass.value; let user=DB.Users.find(x=>String(x.username).toLowerCase()===u.toLowerCase()&&String(x.password)===p&&String(x.active)!=='FALSE'); if(!user){toast('Wrong login or inactive user');return} current=user; document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); document.getElementById('who').textContent=user.username+' • '+user.role; track('login','Logged in'); renderNav(); show('Dashboard')}
function logout(){track('logout','Logged out'); current=null; document.getElementById('app').classList.add('hidden'); document.getElementById('login').classList.remove('hidden')}
function allowedPages(){return current.role==='admin'?DEPTS:String(current.pages||'').split('|').filter(Boolean)}
function renderNav(){let items=['Dashboard','Live Class',...allowedPages()]; if(current.role==='admin')items.push('Admin Users','QBank','Paper Builder','Activity Summary','Settings'); side.innerHTML=items.map(i=>`<button class="navBtn ${active===i?'active':''}" onclick="show('${i.replace(/'/g,"\\'")}')">${i}</button>`).join('')}
function show(s){active=s;renderNav(); if(s==='Dashboard')return dashboard(); if(s==='Live Class')return liveClass(); if(DEPTS.includes(s))return deptPage(s); if(s==='Admin Users')return adminUsers(); if(s==='QBank')return qbank(); if(s==='Paper Builder')return paperBuilder(); if(s==='Activity Summary')return activitySummary(); if(s==='Settings')return settings();}
async function track(type,detail,extra={}){let row={id:uid('ACT'),time:new Date().toISOString(),username:current?.username||'',type,detail,...extra}; DB.Activity.push(row); if(online) return await saveSheet('Activity',row,'Saving activity to Google Sheet...'); return true}
function dashboard(){main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">Dashboard</h1><p class="sub">Aviation Security Learning Management System</p></div>${allowedPages().map(d=>`<div class="card col4"><h3>${d}</h3><p class="sub">Videos, class material and assigned papers.</p><button class="btn small" onclick="show('${d}')">Open</button></div>`).join('')}</div>`}
function getDriveEmbed(link){let m=String(link||'').match(/\/d\/([^\/]+)/)||String(link||'').match(/[?&]id=([^&]+)/);return m?`https://drive.google.com/file/d/${m[1]}/preview`:link}
function liveClass(){let rows=DB.LiveClasses||[]; main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">Live Class</h1>${current.role==='admin'?`<div class="split"><div><label>Title</label><input id="lcTitle"></div><div><label>Zoom/Meet Link</label><input id="lcLink"></div></div><br><button class="btn" onclick="addLive()">Save Live Link</button>`:''}</div><div class="card col12"><table class="table"><tr><th>Title</th><th>Link</th><th>Action</th></tr>${rows.map(r=>`<tr><td>${r.title||''}</td><td>${r.link||''}</td><td><button class="btn small" onclick="window.open('${r.link}','_blank');track('live_class','Opened live class',{classTitle:'${String(r.title||'').replace(/'/g,'')}'});">Join</button></td></tr>`).join('')}</table></div></div>`}
async function addLive(){let row={id:uid('LC'),title:lcTitle.value,link:lcLink.value,created:new Date().toISOString()};DB.LiveClasses.push(row); if(await saveSheet('LiveClasses',row))toast('Saved');liveClass()}
function deptPage(dep){let vids=(DB.Videos||[]).filter(v=>v.department===dep);let papers=(DB.Papers||[]).filter(p=>p.department===dep&&String(p.published)!=='FALSE'); main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">${dep}</h1>${current.role==='admin'?`<div class="split"><div><label>Video title</label><input id="vTitle"></div><div><label>Google Drive Video Link</label><input id="vLink"></div></div><br><button class="btn" onclick="addVideo('${dep}')">Add Video</button>`:''}</div><div class="card col8"><h3>Videos</h3>${vids.map(v=>`<div class="card" style="margin:10px 0"><h3>${v.title}</h3><iframe class="videoFrame" src="${getDriveEmbed(v.link)}" allow="autoplay" allowfullscreen></iframe><br><button class="btn small ok" onclick="markWatched('${v.id}','${dep}')">Mark as Watched</button></div>`).join('')||'<p class="sub">No videos yet.</p>'}</div><div class="card col4"><h3>Papers</h3>${papers.map(p=>`<div class="notice" style="margin:8px 0"><b>${p.title}</b><br><span class="sub">Questions: ${p.count}</span><br><button class="btn small" onclick="startPaper('${p.id}')">Start Paper</button></div>`).join('')||'<p class="sub">No papers assigned.</p>'}</div></div>`}
async function addVideo(dep){let row={id:uid('VID'),department:dep,title:vTitle.value,link:vLink.value,created:new Date().toISOString()};DB.Videos.push(row); if(await saveSheet('Videos',row))toast('Video saved');deptPage(dep)}
async function markWatched(id,dep){await track('video_watched','Watched video',{videoId:id,department:dep});toast('Video watched saved')}
function qbank(){let qs=DB.QBank||[]; main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">QBank</h1><div class="split"><div><label>Department</label><select id="qDep">${DEPTS.map(d=>`<option>${d}</option>`)}</select></div><div><label>Import Excel</label><input type="file" id="qFile" accept=".xlsx,.xls,.csv"></div></div><button class="btn" onclick="importQ()">Import</button><hr style="border-color:#263d59"><div class="split"><input id="qq" placeholder="Question"><input id="qa" placeholder="Answer"></div><div class="split"><input id="qo" placeholder="Options separated by |"><button class="btn" onclick="addQ()">Add Question</button></div></div><div class="card col12"><table class="table"><tr><th>Department</th><th>Question</th><th>Options</th><th>Answer</th><th></th></tr>${qs.map(q=>`<tr><td>${q.department}</td><td>${q.question}</td><td>${q.options}</td><td>${q.answer}</td><td><button class="btn small danger" onclick="delQ('${q.id}')">Delete</button></td></tr>`).join('')}</table></div></div>`}
async function addQ(){let row={id:uid('Q'),department:qDep.value,question:qq.value,options:qo.value,answer:qa.value,created:new Date().toISOString()};DB.QBank.push(row); if(await saveSheet('QBank',row))toast('Question saved');qbank()}
async function delQ(id){DB.QBank=DB.QBank.filter(x=>x.id!==id); await deleteSheet('QBank',id); qbank()}
function importQ(){let f=qFile.files[0]; if(!f)return; let reader=new FileReader(); reader.onload=async e=>{let wb=XLSX.read(e.target.result,{type:'array'});let sh=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); for(const x of sh){let row={id:uid('Q'),department:x.Department||x.department||qDep.value,question:x.Question||x.question||'',options:x.Options||x.options||'',answer:x.Answer||x.answer||'',created:new Date().toISOString()}; if(row.question){DB.QBank.push(row); if(online) await saveSheet('QBank',row)}} toast('Imported');qbank()}; reader.readAsArrayBuffer(f)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function paperBuilder(){main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">Paper Builder</h1><div class="split"><div><label>Department</label><select id="pDep">${DEPTS.map(d=>`<option>${d}</option>`)}</select></div><div><label>Paper Title</label><input id="pTitle" placeholder="Final Paper"></div></div><div class="split"><div><label>Question Count</label><input id="pCount" type="number" value="10"></div><div><label>Publish</label><select id="pPub"><option value="TRUE">Yes</option><option value="FALSE">No</option></select></div></div><br><button class="btn" onclick="createPaper()">Shuffle & Create Paper</button></div><div class="card col12"><table class="table"><tr><th>Paper</th><th>Department</th><th>Questions</th><th>Export</th></tr>${(DB.Papers||[]).map(p=>`<tr><td>${p.title}</td><td>${p.department}</td><td>${p.count}</td><td><button class="btn small" onclick="exportPaper('${p.id}')">Export without Answers</button></td></tr>`).join('')}</table></div></div>`}
async function createPaper(){let pool=(DB.QBank||[]).filter(q=>q.department===pDep.value);let selected=shuffle(pool).slice(0,Number(pCount.value||10));let paper={id:uid('P'),department:pDep.value,title:pTitle.value||'Paper',count:selected.length,published:pPub.value,created:new Date().toISOString()};DB.Papers.push(paper);await saveSheet('Papers',paper);for(let i=0;i<selected.length;i++){let r={id:uid('PQ'),paperId:paper.id,qid:selected[i].id,number:i+1};DB.PaperQuestions.push(r); if(online)await saveSheet('PaperQuestions',r)}toast('Paper created');paperBuilder()}
function exportPaper(pid){let p=DB.Papers.find(x=>x.id===pid), qs=getPaperQs(pid);let html=`<h1>${p.title}</h1><h3>${p.department}</h3>${qs.map((q,i)=>`<p><b>${i+1}. ${q.question}</b></p><ol type="A">${String(q.options||'').split('|').filter(Boolean).map(o=>`<li>${o}</li>`).join('')}</ol>`).join('')}`;let w=window.open('','_blank');w.document.write(html);w.document.close();w.print()}
function getPaperQs(pid){let ids=(DB.PaperQuestions||[]).filter(x=>x.paperId===pid).sort((a,b)=>Number(a.number)-Number(b.number));return ids.map(x=>DB.QBank.find(q=>q.id===x.qid)).filter(Boolean)}
function startPaper(pid){let p=DB.Papers.find(x=>x.id===pid), qs=getPaperQs(pid); main.innerHTML=`<div class="card"><h1>${p.title}</h1><form id="paperForm">${qs.map((q,i)=>`<div class="notice" style="margin:12px 0"><b>${i+1}. ${q.question}</b>${String(q.options||'').split('|').filter(Boolean).map(o=>`<label class="qOption"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`).join('')}</div>`).join('')}<button type="button" class="btn" onclick="submitPaper('${pid}')">Submit</button></form></div>`;track('paper_started','Started paper',{paperId:pid})}
async function submitPaper(pid){let p=DB.Papers.find(x=>x.id===pid), qs=getPaperQs(pid);let correct=0, answers=[];qs.forEach((q,i)=>{let val=document.querySelector(`input[name=q${i}]:checked`)?.value||'';if(val.trim()===String(q.answer).trim())correct++;answers.push({q:q.question,selected:val,correct:q.answer})});let percent=qs.length?Math.round(correct/qs.length*100):0;let att={id:uid('ATT'),time:new Date().toISOString(),username:current.username,paperId:pid,paperTitle:p.title,department:p.department,total:qs.length,score:correct,percent,answers:JSON.stringify(answers)};DB.Attempts.push(att);await saveSheet('Attempts',att,'Submitting paper and saving marks...');await track('paper_completed','Completed paper',{paperId:pid,score:correct,total:qs.length,percent});main.innerHTML=`<div class="card" id="marksheet"><h1>Mark Sheet</h1><p>User: <b>${current.username}</b></p><p>Paper: <b>${p.title}</b></p><p>Score: <b>${correct}/${qs.length}</b> (${percent}%)</p><p>Date: ${new Date().toLocaleString()}</p></div><br><button class="btn" onclick="html2pdf().from(document.getElementById('marksheet')).save('mark-sheet.pdf')">Download PDF</button>`}
function adminUsers(){main.innerHTML=`<div class="grid"><div class="card col12"><h1 class="title">User Management</h1><div class="split"><input id="uName" placeholder="Username"><input id="uPass" placeholder="Password"></div><div class="field"><label>Pages Access</label>${DEPTS.map(d=>`<label class="pill" style="margin:4px"><input type="checkbox" class="pg" value="${d}"> ${d}</label>`).join('')}</div><button class="btn" onclick="addUser()">Create User</button></div><div class="card col12"><table class="table"><tr><th>Username</th><th>Role</th><th>Pages</th><th>Active</th></tr>${DB.Users.map(u=>`<tr><td>${u.username}</td><td>${u.role}</td><td>${u.pages}</td><td>${u.active}</td></tr>`).join('')}</table></div></div>`}
async function addUser(){let pages=[...document.querySelectorAll('.pg:checked')].map(x=>x.value).join('|');let row={id:uid('U'),username:uName.value,password:uPass.value,role:'user',pages,active:'TRUE',created:new Date().toISOString()};DB.Users.push(row);if(await saveSheet('Users',row))toast('User created');adminUsers()}
function activitySummary(){let users=[...new Set([...(DB.Users||[]).map(u=>u.username),...(DB.Activity||[]).map(a=>a.username),...(DB.Attempts||[]).map(a=>a.username)].filter(Boolean))];main.innerHTML=`<div class="grid"><div class="card col4"><h1 class="title">Activity Summary</h1>${users.map(u=>`<div class="notice userLink" onclick="userActivity('${u}')">${u}</div>`).join('')}</div><div class="card col8" id="userAct"><p class="sub">Click user name to view full activity.</p></div></div>`}
function userActivity(u){let acts=(DB.Activity||[]).filter(a=>a.username===u);let atts=(DB.Attempts||[]).filter(a=>a.username===u);userAct.innerHTML=`<div id="actPdf"><h2>${u} Activity</h2><h3>Paper Attempts</h3><table class="table"><tr><th>Paper</th><th>Score</th><th>Date</th></tr>${atts.map(a=>`<tr><td>${a.paperTitle}</td><td>${a.score}/${a.total} (${a.percent}%)</td><td>${a.time}</td></tr>`).join('')}</table><h3>Activity Log</h3><table class="table"><tr><th>Time</th><th>Type</th><th>Detail</th></tr>${acts.map(a=>`<tr><td>${a.time}</td><td>${a.type}</td><td>${a.detail}</td></tr>`).join('')}</table></div><br><button class="btn" onclick="html2pdf().from(document.getElementById('actPdf')).save('${u}-activity.pdf')">Export PDF</button>`}
function settings(){main.innerHTML=`<div class="card"><h1 class="title">Settings</h1><p class="sub">Google Sheet API connected inside code.</p><div class="notice">${API_URL}</div></div>`}
loadAll();
</script>
</body>
</html>

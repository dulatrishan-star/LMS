<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVSEC LMS | Aviation Security Learning Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand-row">
        <img src="assets/avsec-logo.svg" alt="AVSEC Logo" />
        <div><h1>AVSEC LMS</h1><p>Aviation Security Training Portal</p></div>
      </div>
      <div class="login-tabs"><button class="active" data-login-type="admin">Admin</button><button data-login-type="user">User</button></div>
      <form id="loginForm">
        <label>Username</label><input id="username" autocomplete="username" placeholder="Admin" required />
        <label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="Airbus@24" required />
        <button class="primary" type="submit">Login</button><p id="loginMsg" class="msg"></p>
      </form>
      <div class="demo-box"><b>Default Admin:</b> Admin / Airbus@24</div>
    </div>
  </div>
  <div id="app" class="app hidden">
    <aside class="sidebar"><div class="side-brand"><img src="assets/avsec-logo.svg" alt="AVSEC" /><div><b>AVSEC LMS</b><small id="roleBadge">Admin</small></div></div><nav id="mainNav"></nav><button id="logoutBtn" class="ghost">Logout</button></aside>
    <main class="main"><header class="topbar"><div><h2 id="pageTitle">Dashboard</h2><p id="pageSub">Aviation Security Learning Management System</p></div><div class="user-chip" id="currentUserChip">Admin</div></header>
      <section id="dashboardPage" class="page active"></section><section id="livePage" class="page"></section><section id="deptPage" class="page"></section><section id="qbankPage" class="page"></section><section id="paperPage" class="page"></section><section id="activityPage" class="page"></section><section id="usersPage" class="page"></section><section id="settingsPage" class="page"></section>
    </main>
  </div>
  <dialog id="userDialog"><form method="dialog" class="dialog-card"><h3>Create / Edit User</h3><label>Username</label><input id="newUsername" required /><label>Password</label><input id="newPassword" required /><label>Display Name</label><input id="newDisplayName" /><label>Department Access</label><div id="permissionChecks" class="check-grid"></div><menu><button value="cancel" class="ghost">Cancel</button><button id="saveUserBtn" value="default" class="primary">Save</button></menu></form></dialog>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
